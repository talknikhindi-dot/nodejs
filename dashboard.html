<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik IT - Dashboard</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #00ffcc; display: inline-block; box-shadow: 0 0 20px #00ffcc; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00ffcc; margin-bottom: 20px; object-fit: cover; background: #333; }
        h1 { color: #00ffcc; }
        .upload-section { margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        input[type="file"] { margin-bottom: 10px; }
        .btn-logout { background: #ff4d4d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        .btn-upload { background: #00ffcc; color: black; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/150" id="user-pic" class="profile-pic">
        <h1 id="welcome-msg">स्वागत आहे!</h1>
        <p id="user-email"></p>
        
        <div class="upload-section">
            <input type="file" id="photo-input" accept="image/*"><br>
            <button class="btn-upload" onclick="uploadPhoto()">फोटो अपडेट करा</button>
        </div>

        <button class="btn-logout" onclick="logout()">Logout</button>
        <p id="status-msg" style="margin-top:10px; font-size:12px;"></p>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login-panel.html';
        } else {
            document.getElementById('welcome-msg').innerText = "स्वागत आहे, " + user.username;
            document.getElementById('user-email').innerText = user.email;
            if (user.profile_pic) {
                document.getElementById('user-pic').src = user.profile_pic;
            }
        }

        async function uploadPhoto() {
            const fileInput = document.getElementById('photo-input');
            const status = document.getElementById('status-msg');
            
            if (fileInput.files.length === 0) {
                status.innerText = "कृपया फोटो निवडा!";
                status.style.color = "orange";
                return;
            }

            const formData = new FormData();
            formData.append('profile', fileInput.files[0]);
            formData.append('userId', user.id);

            status.innerText = "अपलोड होत आहे...";
            
            try {
                const response = await fetch('https://nodejs-65fz.onrender.com/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('user-pic').src = data.url;
                    user.profile_pic = data.url;
                    localStorage.setItem('user', JSON.stringify(user));
                    status.innerText = "✅ फोटो अपडेट झाला!";
                    status.style.color = "lime";
                }
            } catch (err) {
                status.innerText = "अपलोड अयशस्वी!";
                status.style.color = "red";
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login-panel.html';
        }
    </script>
</body>
</html>
