<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Talknik IT - User Dashboard</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        .card { background: #1a1a1a; border: 2px solid gold; border-radius: 15px; display: inline-block; padding: 30px; box-shadow: 0 0 20px gold; }
        #user-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid gold; object-fit: cover; margin-bottom: 20px; }
        h2 { color: gold; margin: 10px 0; }
        p { font-size: 18px; color: #ccc; }
        .btn-logout { background: red; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <img id="user-img" src="https://via.placeholder.com/150" alt="Profile">
        <h2 id="user-name">Loading...</h2>
        <p id="user-email">email@example.com</p>
        <hr style="border: 0.5px solid #333;">
        <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>

    <script>
        async function loadProfile() {
            // लॉगिन करताना आपण 'userId' साठवला असेल असे समजू
            const userId = localStorage.getItem('userId') || 1; 

            try {
                const response = await fetch(`https://nodejs-65fz.onrender.com/api/user/${userId}`);
                const data = await response.json();

                if(data.success) {
                    document.getElementById('user-name').innerText = data.user.username;
                    document.getElementById('user-email').innerText = data.user.email;
                    if(data.user.profile_pic) {
                        document.getElementById('user-img').src = data.user.profile_pic;
                    }
                }
            } catch (err) {
                console.error("Data load failed", err);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        loadProfile();
    </script>
</body>
</html>
