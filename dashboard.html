<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik IT - Dashboard</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #00ffcc; display: inline-block; box-shadow: 0 0 20px #00ffcc; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00ffcc; margin-bottom: 20px; object-fit: cover; }
        h1 { color: #00ffcc; }
        .btn-logout { background: red; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/150" id="user-pic" class="profile-pic">
        <h1 id="welcome-msg">स्वागत आहे!</h1>
        <p id="user-email"></p>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <script>
        // लॉगिन माहिती तपासणे
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login-panel.html';
        } else {
            document.getElementById('welcome-msg').innerText = "स्वागत आहे, " + user.username;
            document.getElementById('user-email').innerText = user.email;
            if (user.profile_pic) {
                document.getElementById('user-pic').src = user.profile_pic;
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login-panel.html';
        }
    </script>
</body>
</html>
