<!DOCTYPE html>
<html>
<head>
    <title>Talknik IT - Profile Upload</title>
    <style>
        body { background: #000; color: #00ffcc; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 50px; }
        .upload-container { border: 2px dashed #00ffcc; padding: 40px; display: inline-block; border-radius: 15px; background: #111; box-shadow: 0 0 20px #00ffcc; }
        input[type="file"] { margin: 20px 0; color: white; }
        button { background: #00ffcc; color: black; border: none; padding: 12px 30px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        #preview { margin-top: 20px; max-width: 200px; border-radius: 10px; display: none; border: 2px solid #00ffcc; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="upload-container">
        <h2>📷 प्रोफाइल फोटो अपलोड</h2>
        <input type="file" id="imageInput" accept="image/*">
        <br>
        <img id="preview" src="" alt="Preview">
        <br>
        <button onclick="uploadPhoto()">UPLOAD TO RENDER</button>
        <p id="status"></p>
    </div>

    <script>
        // फोटो निवडल्यावर प्रिव्ह्यू दाखवण्यासाठी
        document.getElementById('imageInput').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                const preview = document.getElementById('preview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        }

        async function uploadPhoto() {
            const fileInput = document.getElementById('imageInput');
            const status = document.getElementById('status');
            
            if (fileInput.files.length === 0) {
                status.innerText = "कृपया एक फोटो निवडा!";
                status.style.color = "red";
                return;
            }

            status.innerText = "रेंडरवर पाठवत आहे...";
            status.style.color = "gold";

            const formData = new FormData();
            formData.append('profile', fileInput.files[0]);

            try {
                const response = await fetch('https://nodejs-65fz.onrender.com/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (result.success) {
                    status.innerText = "✅ " + result.message;
                    status.style.color = "lime";
                    console.log("Photo URL:", result.url);
                } else {
                    status.innerText = "❌ अपलोड अयशस्वी!";
                    status.style.color = "red";
                }
            } catch (error) {
                status.innerText = "❌ सर्व्हर एरर!";
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
