<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik IT - Register Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0c29; background: linear-gradient(to right, #000428, #004e92); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .register-card { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .register-card h2 { color: #00ffcc; margin-bottom: 20px; font-size: 24px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; }
        .input-group input:focus { box-shadow: 0 0 10px #00ffcc; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00ffcc; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #fff; transform: scale(1.02); }
        #msg { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>नवीन नोंदणी करा</h2>
        <div class="input-group">
            <label>युजरनेम</label>
            <input type="text" id="reg-user" placeholder="तुमचे नाव">
        </div>
        <div class="input-group">
            <label>ईमेल</label>
            <input type="email" id="reg-email" placeholder="email@example.com">
        </div>
        <div class="input-group">
            <label>पासवर्ड</label>
            <input type="password" id="reg-pass" placeholder="पासवर्ड निवडा">
        </div>
        <button onclick="handleRegister()">REGISTER NOW</button>
        <p id="msg"></p>
        <div style="margin-top:20px; font-size: 12px;">
            आधीच खाते आहे? <a href="login-panel.html" style="color: #00ffcc; text-decoration: none;">लॉगिन करा</a>
        </div>
    </div>

    <script>
        async function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const msg = document.getElementById('msg');

            if(!user || !email || !pass) {
                msg.innerText = "कृपया सर्व माहिती भरा!";
                msg.style.color = "orange";
                return;
            }

            try {
                const response = await fetch('https://nodejs-65fz.onrender.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email: email, password: pass })
                });

                const data = await response.json();
                if(data.success) {
                    msg.innerText = "✅ नोंदणी यशस्वी!";
                    msg.style.color = "lime";
                    setTimeout(() => { window.location.href = "login-panel.html"; }, 2000);
                } else {
                    msg.innerText = "❌ नोंदणी अयशस्वी!";
                    msg.style.color = "red";
                }
            } catch (error) {
                msg.innerText = "सर्व्हर एरर!";
                msg.style.color = "red";
            }
        }
    </script>
</body>
</html>
