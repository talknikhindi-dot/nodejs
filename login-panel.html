<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik IT - Login Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0c29; background: linear-gradient(to right, #24243e, #302b63, #0f0c29); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .login-card h2 { color: #00ffcc; margin-bottom: 20px; font-size: 24px; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { background: rgba(255,255,255,0.3); box-shadow: 0 0 10px #00ffcc; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00ffcc; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,204,0.4); }
        #status-msg { margin-top: 15px; font-size: 14px; }
        .footer-links { margin-top: 20px; font-size: 12px; }
        .footer-links a { color: #00ffcc; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>TALKNIK IT</h2>
        <div class="input-group">
            <label>युजरनेम</label>
            <input type="text" id="user" placeholder="तुमचे नाव टाका">
        </div>
        <div class="input-group">
            <label>पासवर्ड</label>
            <input type="password" id="pass" placeholder="पासवर्ड टाका">
        </div>
        <button onclick="handleLogin()">लॉगिन करा</button>
        <p id="status-msg"></p>
        
        <div class="footer-links">
            अद्याप खाते नाही? <a href="register.html">नोंदणी करा</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const msg = document.getElementById('status-msg');

            if(!user || !pass) {
                msg.innerText = "सर्व रकाने भरा!";
                msg.style.color = "orange";
                return;
            }

            msg.innerText = "तपासत आहे...";
            msg.style.color = "cyan";

            try {
                const response = await fetch('https://nodejs-65fz.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if(data.success) {
                    msg.innerText = "लॉगिन यशस्वी! डॅशबोर्डवर नेत आहे...";
                    msg.style.color = "lime";
                    localStorage.setItem('userId', data.user.id);
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
                } else {
                    msg.innerText = "चुकीचे युजरनेम किंवा पासवर्ड!";
                    msg.style.color = "#ff4d4d";
                }
            } catch (error) {
                msg.innerText = "सर्व्हर एरर! कृपया पुन्हा प्रयत्न करा.";
                msg.style.color = "#ff4d4d";
            }
        }
    </script>
</body>
</html>
